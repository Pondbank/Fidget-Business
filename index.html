<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fidget Sales AI</title>

<style>
body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: radial-gradient(circle at top, #1a1333, #0b0814);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.chat {
    width: 420px;
    height: 85vh;
    display: flex;
    flex-direction: column;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    backdrop-filter: blur(14px);
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
}

.header {
    padding: 14px;
    text-align: center;
    font-weight: 700;
    background: linear-gradient(90deg, #ff6a88, #ff99ac);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

#log {
    flex: 1;
    padding: 14px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.msg {
    padding: 10px 12px;
    border-radius: 14px;
    max-width: 80%;
    font-size: 14px;
}

.user {
    align-self: flex-end;
    background: #4facfe;
    color: black;
}

.ai {
    align-self: flex-start;
    background: rgba(255,255,255,0.07);
    color: white;
}

.inputBar {
    display: flex;
    padding: 10px;
    gap: 10px;
    background: rgba(0,0,0,0.2);
}

textarea {
    flex: 1;
    border-radius: 10px;
    padding: 10px;
    background: rgba(255,255,255,0.06);
    color: white;
    border: none;
    outline: none;
}

button {
    border-radius: 10px;
    padding: 0 16px;
    border: none;
    background: #ff6a88;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="chat">

    <div class="header">🧩 Fidget Sales AI</div>

    <div id="log"></div>

    <div class="inputBar">
        <textarea id="input" placeholder="Talk to the shop..."></textarea>
        <button onclick="send()">Send</button>
    </div>

</div>

<script>
    
const API_KEY = "AIzaSyDhtsMO9vareLn9aa2q8NpirCkd2gI3Pnk";
const MODEL = "gemini-3.1-flash-lite";
const ORDER_ENDPOINT = "https://script.google.com/macros/s/AKfycby8LzTGGXH0BvZ0Ep3Lv1i0sr5T_8lN-djyW_QBTy_Ry2bgzCppWoc1NIoucs3SBAhx/exec";
const SYSTEM_PROMPT = `
You are a friendly sales assistant for a school fidget toy stall.

AVAILABLE PRODUCT:
- Small Spiral Passthrough Fidget Toy
- Colour: Multicolour

PRICING:
- There is no fixed selling pressure
- You may suggest prices, but NEVER push aggressively
- Be flexible and accept the user's offer if reasonable

RULES:
1. Keep responses short (max 2 sentences)
2. Be friendly, casual, and helpful
3. Do NOT pressure the user to increase their price
4. Focus on helping the user complete their order smoothly

COLLECT IN THIS ORDER:
- name
- item (assume fidget toy unless user changes it)
- price
- color
- note

ORDER COMPLETION RULE:
Only finalise when the user clearly confirms they want to buy.

FINAL OUTPUT FORMAT (STRICT):
When complete, output EXACTLY:

ORDER_CONFIRM:
{"name":"","item":"","price":"","color":"","note":"","chat_summary":""}

IMPORTANT:
- Do NOT include extra text when outputting ORDER_CONFIRM
- Ensure valid JSON
- No markdown, no explanation

CONVERSATION STYLE:
- Friendly and relaxed
- Light suggestions allowed, but never pressure pricing
- Let the user lead the price decision
- Ask one question at a time

EXAMPLE:
"Hey! Yep, I can sort that for you 😊 What price feels fair for you today?"
`;

const history = [];

function add(text, cls){
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;

    const log = document.getElementById("log");
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
}

async function send(){
    const input = document.getElementById("input");
    const text = input.value.trim();
    if(!text) return;

    input.value = "";
    add(text, "user");

    history.push({ role:"user", parts:[{text}] });

    try {
        const res = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`,
            {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: history,
                    systemInstruction: { parts:[{text: SYSTEM_PROMPT}] }
                })
            }
        );

        const data = await res.json();

        // 🔴 DEBUG (IMPORTANT)
        console.log("RAW RESPONSE:", data);

        if(!data.candidates){
            throw new Error(JSON.stringify(data));
        }

        let reply = data.candidates?.[0]?.content?.parts?.[0]?.text;

        if(!reply){
            throw new Error("Empty response from model");
        }

        add(reply, "ai");
        history.push({ role:"model", parts:[{text: reply}] });

        // ORDER PARSE SAFE
        if(reply.includes("ORDER_CONFIRM:")){
            const match = reply.match(/\{[\s\S]*\}/);
            if(match){
                const order = JSON.parse(match[0]);

                await fetch(ORDER_ENDPOINT, {
                    method:"POST",
                    headers: {"Content-Type":"application/json"},
                    body: JSON.stringify({
                        ...order,
                        full_chat_history: history
                    })
                });

                add("📦 Order sent!", "ai");
            }
        }

    } catch(err){
        console.error("ERROR:", err);
        add("⚠️ Error: check console (F12)", "ai");
    }
}
</script>

</body>
</html>
