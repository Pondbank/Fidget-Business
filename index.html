<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fidget Sales AI</title>
<style>
  body { margin: 0; font-family: system-ui, sans-serif; background: #0b0814; height: 100vh; display: flex; justify-content: center; align-items: center; }
  .chat { width: 440px; height: 86vh; display: flex; flex-direction: column; background: #1a1333; border: 1px solid #333; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
  .header { padding: 16px; text-align: center; font-weight: bold; background: #2a1f4c; color: #ff99ac; letter-spacing: 0.5px; }
  #log { flex: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
  .msg { padding: 10px 14px; border-radius: 12px; max-width: 80%; font-size: 14px; white-space: pre-wrap; line-height: 1.4; }
  .user { align-self: flex-end; background: #4facfe; color: black; }
  .ai { align-self: flex-start; background: #332955; color: white; }
  .error { align-self: flex-start; background: #552929; color: #ffcccc; font-weight: bold; }
  .system { align-self: center; background: #1b4d24; color: #bdfcc9; font-size: 12px; }
  .inputBar { display: flex; padding: 10px; gap: 10px; background: #110c22; }
  textarea { flex: 1; border-radius: 8px; padding: 10px; border: none; background: #22193b; color: white; outline: none; resize: none; font-family: inherit; }
  button { padding: 0 16px; border: none; border-radius: 8px; background: #ff6a88; font-weight: bold; cursor: pointer; color: black; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<div class="chat">
  <div class="header">🧩 Fidget Sales AI</div>
  <div id="log"></div>
  <div class="inputBar">
    <textarea id="input" placeholder="Talk to the shop..." rows="1"></textarea>
    <button id="sendBtn" onclick="send()">Send</button>
  </div>
</div>

<script>
// UPDATE WITH YOUR RE-DEPLOYED WEB APP URL
const ENDPOINT = "https://script.google.com/macros/s/AKfycbx7Zx6GZoE1Qc1po2Hg2r65aTkwESr3u1g6vqqbCKtmeV1teYELdIjLbzyyLVANep84/exec";
const CLIENT_TOKEN = "FIDG";

let history = [];
let sending = false;

function addMsg(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  document.getElementById("log").appendChild(div);
  div.scrollIntoView({ behavior: "smooth", block: "end" });
}

addMsg("Hey there! Welcome to the shop. Interested in buying our Multicolour Small Spiral Passthrough Fidget Toy?", "ai");

async function send() {
  if (sending) return;
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;
  
  input.value = "";
  addMsg(text, "user");
  history.push({ role: "user", text: text });
  
  sending = true;
  document.getElementById("sendBtn").disabled = true;
  document.getElementById("input").placeholder = "Typing...";

  try {
    const res = await fetch(ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "text/plain" }, 
      body: JSON.stringify({ token: CLIENT_TOKEN, history: history })
    });
    
    const data = await res.json();
    
    if (data.error) {
      addMsg("⚠️ Server Error: " + data.error, "error");
    } else {
      addMsg(data.reply, "ai");
      history.push({ role: "model", text: data.reply });
      
      if (data.orderSent) {
        if (data.emailStatus === "failed_api") {
          addMsg("⚠️ Order recorded, but Gmail blocked transmission. Check Apps Script app permissions.", "error");
        } else {
          addMsg("✅ Order logged and emailed to shop owner!", "system");
        }
      }
    }
  } catch (e) {
    addMsg("⚠️ Network/CORS Check failure. Ensure deployment settings allow access to 'Anyone'.", "error");
  } finally {
    sending = false;
    document.getElementById("sendBtn").disabled = false;
    document.getElementById("input").placeholder = "Talk to the shop...";
    document.getElementById("input").focus();
  }
}

document.getElementById("input").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});
</script>
</body>
</html>
