<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Fidgety AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-top: #2a1b45;
    --bg-bottom: #4b2e73;
    --surface: #ffffff;
    --surface-dim: #f4effe;
    --ink: #241733;
    --ink-soft: #6a5c85;
    --pink: #ff5d8f;
    --mint: #2fd6a7;
    --yellow: #ffc93c;
    --coral: #ff6b6b;
    --radius-lg: 22px;
    --radius-sm: 14px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    font-family: 'Nunito', system-ui, sans-serif;
    background:
      radial-gradient(circle at 15% 8%, rgba(255,201,60,0.18), transparent 40%),
      radial-gradient(circle at 85% 92%, rgba(47,214,167,0.16), transparent 45%),
      linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 0;
  }

  .chat {
    width: 440px;
    max-width: 100vw;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--surface-dim);
    border: none;
    border-radius: 0;
    overflow: hidden;
    box-shadow: none;
    position: relative;
  }

  /* Bubble-wrap style texture strip under the header, a nod to fidget pop-its */
  .chat::before {
    content: "";
    position: absolute;
    top: 84px;
    left: 0;
    right: 0;
    height: 10px;
    background-image: radial-gradient(circle, rgba(255,255,255,0.55) 2.5px, transparent 2.6px);
    background-size: 16px 16px;
    background-position: 6px 3px;
    opacity: 0.9;
    pointer-events: none;
    z-index: 2;
  }

  .header {
    padding: 18px 16px 22px;
    text-align: center;
    background: linear-gradient(120deg, var(--pink), #b45cff 65%, #6a5cff);
    color: white;
    position: relative;
    flex-shrink: 0;
  }

  .header .title {
    font-family: 'Baloo 2', system-ui, sans-serif;
    font-weight: 800;
    font-size: 21px;
    letter-spacing: 0.2px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .header .subtitle {
    font-size: 12.5px;
    font-weight: 600;
    opacity: 0.85;
    margin-top: 4px;
  }

  .spin-icon {
    display: inline-block;
    animation: lazySpin 6s linear infinite;
    transform-origin: 50% 50%;
  }

  @keyframes lazySpin {
    to { transform: rotate(360deg); }
  }

  #log {
    flex: 1;
    padding: 20px 14px 14px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .msg {
    padding: 12px 16px;
    border-radius: var(--radius-lg);
    max-width: 82%;
    font-size: 15px;
    white-space: pre-wrap;
    overflow-wrap: break-word;
    word-break: break-word;
    line-height: 1.45;
    animation: pop-in 0.22s ease;
    box-shadow: 0 2px 8px rgba(42, 27, 69, 0.08);
  }

  @keyframes pop-in {
    from { opacity: 0; transform: translateY(6px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .user {
    align-self: flex-end;
    background: var(--mint);
    color: #0f3d30;
    border-bottom-right-radius: 6px;
    font-weight: 700;
  }

  .ai {
    align-self: flex-start;
    background: var(--surface);
    color: var(--ink);
    border: 1px solid #ece3fb;
    border-bottom-left-radius: 6px;
  }

  .error {
    align-self: flex-start;
    background: #fff0ee;
    color: #b3261e;
    border: 1px solid #ffcfc7;
    font-weight: 700;
    border-bottom-left-radius: 6px;
  }

  .system {
    align-self: center;
    background: #fff4d6;
    color: #7a5b00;
    font-size: 12.5px;
    font-weight: 800;
    text-align: center;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid #ffe19b;
  }

  /* Typing indicator bubble */
  .typing {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid #ece3fb;
    border-bottom-left-radius: 6px;
    padding: 14px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .typing span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--ink-soft);
    opacity: 0.5;
    animation: typingBounce 1.1s infinite ease-in-out;
  }

  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  .inputBar {
    display: flex;
    align-items: flex-end;
    padding: 12px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    gap: 10px;
    background: var(--surface);
    border-top: 1px solid #ece3fb;
    flex-shrink: 0;
  }

  textarea {
    flex: 1;
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    border: 2px solid var(--surface-dim);
    background: var(--surface-dim);
    color: var(--ink);
    outline: none;
    resize: none;
    font-family: inherit;
    font-size: 16px; /* prevents iOS auto-zoom on focus */
    line-height: 1.35;
    max-height: 120px;
    overflow-y: auto;
    transition: border-color 0.15s ease;
  }

  textarea:focus {
    border-color: var(--pink);
    background: var(--surface);
  }

  textarea::placeholder {
    color: var(--ink-soft);
  }

  button {
    width: 48px;
    height: 48px;
    flex-shrink: 0;
    border: none;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink), #b45cff);
    font-weight: 800;
    cursor: pointer;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 12px rgba(255, 93, 143, 0.35);
    transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
  }

  button:active {
    transform: scale(0.92) rotate(20deg);
  }

  button:disabled {
    opacity: 0.55;
    cursor: not-allowed;
    box-shadow: none;
    filter: grayscale(0.3);
  }

  button svg {
    width: 20px;
    height: 20px;
  }

  /* Scrollbar polish for desktop testing */
  #log::-webkit-scrollbar { width: 6px; }
  #log::-webkit-scrollbar-thumb { background: #d8c9fb; border-radius: 4px; }

  /* Small phones: drop side gutters entirely, chat already fills viewport */
  @media (max-width: 480px) {
    .chat { width: 100vw; }
    .msg { max-width: 88%; }
  }

  @media (prefers-reduced-motion: reduce) {
    .spin-icon { animation: none; }
    .msg { animation: none; }
    button:active { transform: none; }
    .typing span { animation: none; opacity: 0.7; }
  }
</style>
</head>
<body>
<div class="chat">
  <div class="header">
    <div class="title"><span class="spin-icon">🧩</span> Fidgety AI</div>
    <div class="subtitle">Fidgety Shop - KN Industries</div>
  </div>
  <div id="log"></div>
  <div class="inputBar">
    <textarea id="input" placeholder="Talk to the shop..." rows="1" autofocus></textarea>
    <button id="sendBtn" onclick="send()" aria-label="Send message">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 11.5L21 3L13.5 21L11 13L3 11.5Z" fill="white"/>
      </svg>
    </button>
  </div>
</div>

<script>
// UPDATE WITH YOUR RE-DEPLOYED APPS SCRIPT WEB APP URL EACH TIME YOU VERSION IT
const ENDPOINT = "https://script.google.com/macros/s/AKfycbxAPBuLmMhODW_exQb1mrTRs-B4Thx4gHTWyym46Ci5nNYSLAHY9gANPW5o1GNDOFCm/exec";
const CLIENT_TOKEN = "FIDG";
const REQUEST_TIMEOUT_MS = 30000;

let history = [];
let sending = false;

const logEl = document.getElementById("log");
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");

function addMsg(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  logEl.appendChild(div);
  div.scrollIntoView({ behavior: "smooth", block: "end" });
  return div;
}

function showTyping() {
  const div = document.createElement("div");
  div.className = "typing";
  div.id = "typingBubble";
  div.innerHTML = "<span></span><span></span><span></span>";
  logEl.appendChild(div);
  div.scrollIntoView({ behavior: "smooth", block: "end" });
}

function hideTyping() {
  const bubble = document.getElementById("typingBubble");
  if (bubble) bubble.remove();
}

function autoGrow() {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
}

// Initial Greeting
addMsg("Hey there! Welcome to the shop. Interested in buying a Fidget Toy?", "ai");
inputEl.focus();

async function send() {
  if (sending) return;
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = "";
  autoGrow();
  addMsg(text, "user");
  history.push({ role: "user", text: text });

  sending = true;
  sendBtn.disabled = true;
  inputEl.placeholder = "Typing...";
  showTyping();

  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), REQUEST_TIMEOUT_MS);

  try {
    const res = await fetch(ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ token: CLIENT_TOKEN, history: history }),
      signal: controller.signal
    });

    hideTyping();

    if (!res.ok) {
      addMsg("⚠️ Server Error: HTTP " + res.status, "error");
      return;
    }

    let data;
    try {
      data = await res.json();
    } catch (parseErr) {
      addMsg("⚠️ Server Error: unexpected response format.", "error");
      return;
    }

    if (data.error) {
      addMsg("⚠️ Server Error: " + data.error, "error");
    } else {
      addMsg(data.reply, "ai");
      history.push({ role: "model", text: data.reply });

      // Handle the spreadsheet database output validation status
      if (data.orderSent) {
        if (data.sheetStatus === "failed_api") {
          addMsg("⚠️ Order recorded by bot, but not sent to seller.", "error");
        } else {
          addMsg("✅ Order sent to seller!", "system");
        }
      }
    }
  } catch (e) {
    hideTyping();
    if (e.name === "AbortError") {
      addMsg("⏱️ The shop is taking too long to reply. Please try again.", "error");
    } else {
      addMsg("⚠️ Connection Error", "error");
    }
  } finally {
    clearTimeout(timeoutId);
    sending = false;
    sendBtn.disabled = false;
    inputEl.placeholder = "Talk to the shop...";
    inputEl.focus();
  }
}

inputEl.addEventListener("input", autoGrow);

inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});
</script>
</body>
</html>
