<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fidget Sales AI</title>

<style>
body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: radial-gradient(circle at top, #1a1333, #0b0814);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 🧊 main shell */
.chat {
    width: 430px;
    height: 86vh;
    display: flex;
    flex-direction: column;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 22px;
    backdrop-filter: blur(16px);
    overflow: hidden;
    box-shadow: 0 30px 90px rgba(0,0,0,0.65);
}

/* 🔥 header */
.header {
    padding: 16px;
    text-align: center;
    font-weight: 800;
    letter-spacing: 1px;
    background: linear-gradient(90deg, #ff6a88, #ff99ac);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

/* 📜 chat area */
#log {
    flex: 1;
    padding: 14px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* 💬 messages */
.msg {
    padding: 11px 13px;
    border-radius: 16px;
    max-width: 82%;
    font-size: 14px;
    line-height: 1.35;
    animation: pop 0.2s ease-out;
    white-space: pre-wrap;
}

.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: #000;
}

.ai {
    align-self: flex-start;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.08);
    color: #f1f1f1;
}

/* ⌨️ input */
.inputBar {
    display: flex;
    padding: 12px;
    gap: 10px;
    background: rgba(0,0,0,0.25);
    border-top: 1px solid rgba(255,255,255,0.08);
}

textarea {
    flex: 1;
    resize: none;
    border-radius: 12px;
    border: none;
    padding: 10px;
    background: rgba(255,255,255,0.06);
    color: white;
    outline: none;
}

button {
    padding: 0 16px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #ff6a88, #ff99ac);
    color: black;
    font-weight: 800;
    cursor: pointer;
}

button:hover {
    transform: translateY(-1px);
}

/* ✨ animation */
@keyframes pop {
    from { transform: translateY(6px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

/* 📘 onboarding */
.info {
    margin: 10px 12px;
    padding: 12px 14px;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(255,106,136,0.15), rgba(79,172,254,0.10));
    border: 1px solid rgba(255,255,255,0.14);
    color: #fff;
    font-size: 13px;
    line-height: 1.45;
    text-align: center;
}
</style>
</head>

<body>

<div class="chat">

    <div class="header">Fidgety AI</div>

    <div class="info">
        🧩 <b>How it works</b><br><br>
        1️⃣ Chat to Fidgety to place your order<br>
        2️⃣ Give Fidgety your order details<br>
        3️⃣ Once confirmed → order is sent to seller the seller automatically
    </div>

    <div id="log"></div>

    <div class="inputBar">
        <textarea id="input" placeholder="Talk to the shop..."></textarea>
        <button onclick="send()">Send</button>
    </div>

</div>

<script>

const ORDER_ENDPOINT =
"https://script.google.com/macros/s/AKfycbxo6F38MRvZsgLItDfYksWWuLcROhliOe1nYBlrgdysFeHEl4iP0FVNXDWr9L50kYoF/exec";

const SYSTEM_PROMPT = `
You are a friendly school fidget toy sales assistant.

TASK:
- Help user negotiate price casually (NOT pushy)
- Collect: name, item, price, color, note
- Keep replies max 2 sentences

PRODUCT:
- Small Spiral Passthrough Fidget Toy
- Multicolour

RULES:
- Friendly tone
- No pressure on pricing
- Ask one question at a time

FINAL OUTPUT (STRICT):
ONLY when complete output:

ORDER_CONFIRM:
{"name":"","item":"","price":"","color":"","note":"","chat_summary":""}
`;

const history = [];

function add(text, cls){
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;

    const log = document.getElementById("log");
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
}

/* 🧠 SAFE PARSE */
function extractOrder(text){
    const start = text.indexOf("{");
    const end = text.lastIndexOf("}");
    if(start === -1 || end === -1) return null;

    try {
        return JSON.parse(text.slice(start, end + 1));
    } catch {
        return null;
    }
}

async function send(){

    const input = document.getElementById("input");
    const text = input.value.trim();
    if(!text) return;

    input.value = "";
    add(text, "user");

    history.push({ role:"user", parts:[{text}] });

    try {

        const payload = encodeURIComponent(JSON.stringify({
            contents: history,
            systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] }
        }));

        const res = await fetch(ORDER_ENDPOINT + "?data=" + payload);
        const data = await res.json();

        const reply =
            data?.candidates?.[0]?.content?.parts?.[0]?.text ||
            data?.text ||
            "⚠️ No response";

        add(reply, "ai");

        history.push({ role:"model", parts:[{text: reply}] });

        /* 📦 ORDER HANDLER */
        if(reply.includes("ORDER_CONFIRM")){
            const order = extractOrder(reply);

            if(order){
                await fetch(ORDER_ENDPOINT, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        order,
                        full_chat_history: history
                    })
                });

                add("📦 Order sent!", "ai");
            } else {
                add("⚠️ Could not parse order", "ai");
            }
        }

    } catch(err){
        console.error(err);
        add("⚠️ Connection error", "ai");
    }
}

/* enter send */
document.getElementById("input").addEventListener("keydown", e => {
    if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        send();
    }
});

</script>

</body>
</html>
