<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fidget Sales AI</title>

<style>
body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: radial-gradient(circle at top, #1a1333, #0b0814);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 🧊 container */
.chat {
    width: 440px;
    height: 86vh;
    display: flex;
    flex-direction: column;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 22px;
    backdrop-filter: blur(18px);
    overflow: hidden;
    box-shadow: 0 30px 90px rgba(0,0,0,0.65);
}

/* 🔥 header */
.header {
    padding: 16px;
    text-align: center;
    font-weight: 900;
    letter-spacing: 1px;
    background: linear-gradient(90deg, #ff6a88, #ff99ac);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* 📘 onboarding */
.info {
    margin: 10px 12px;
    padding: 12px 14px;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(255,106,136,0.15), rgba(79,172,254,0.10));
    border: 1px solid rgba(255,255,255,0.14);
    color: white;
    font-size: 13px;
    line-height: 1.45;
    text-align: center;
}

/* 💬 chat */
#log {
    flex: 1;
    padding: 12px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.msg {
    padding: 10px 12px;
    border-radius: 14px;
    max-width: 82%;
    font-size: 14px;
    white-space: pre-wrap;
}

.user {
    align-self: flex-end;
    background: #4facfe;
    color: black;
}

.ai {
    align-self: flex-start;
    background: rgba(255,255,255,0.08);
    color: white;
}

/* ⌨️ input */
.inputBar {
    display: flex;
    padding: 10px;
    gap: 10px;
    background: rgba(0,0,0,0.25);
}

textarea {
    flex: 1;
    border-radius: 10px;
    padding: 10px;
    border: none;
    background: rgba(255,255,255,0.06);
    color: white;
    outline: none;
}

button {
    padding: 0 16px;
    border: none;
    border-radius: 10px;
    background: #ff6a88;
    font-weight: 800;
    cursor: pointer;
}

</style>
</head>

<body>

<div class="chat">

<div class="header">🧩 Fidget Sales AI</div>

<div class="info">
<b>How ordering works</b><br><br>
1️⃣ Chat with the AI to negotiate price<br>
2️⃣ Provide: name, item, colour, note<br>
3️⃣ Confirm → order is emailed automatically 📧
</div>

<div id="log"></div>

<div class="inputBar">
    <textarea id="input" placeholder="Talk to the shop..."></textarea>
    <button onclick="send()">Send</button>
</div>

</div>

<script>

const ENDPOINT =
"https://script.google.com/macros/s/AKfycbx5RI9oEseEt1f1UzkzczHYPaz5Rwe-AQuC7dZt5o687csp-s6bOJjS66a59mXHR6Ej/exec";

const history = [];

/* 💬 UI */
function add(text, cls){
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;
    document.getElementById("log").appendChild(div);
}

/* 📦 send */
async function send(){

    const input = document.getElementById("input");
    const text = input.value.trim();
    if(!text) return;

    input.value = "";
    add(text, "user");

    history.push({ role:"user", parts:[{text}] });

    try {

        const res = await fetch(ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ history })
        });

        const data = await res.json();

        add(data.reply, "ai");

        history.push({ role:"model", parts:[{text: data.reply}] });

        if(data.orderSent){
            add("📦 Order emailed successfully!", "ai");
        }

    } catch (e) {
        add("⚠️ Connection error", "ai");
    }
}

document.getElementById("input").addEventListener("keydown", e => {
    if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        send();
    }
});

</script>

</body>
</html>
