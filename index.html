<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fidget Sales AI</title>

<style>
body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: radial-gradient(circle at top, #1a1333, #0b0814);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.chat {
    width: 420px;
    height: 85vh;
    display: flex;
    flex-direction: column;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    backdrop-filter: blur(14px);
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
}

.header {
    padding: 14px;
    text-align: center;
    font-weight: 700;
    letter-spacing: 1px;
    background: linear-gradient(90deg, #ff6a88, #ff99ac);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    border-bottom: 1px solid rgba(255,255,255,0.06);
}

#log {
    flex: 1;
    padding: 14px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.msg {
    padding: 10px 12px;
    border-radius: 14px;
    max-width: 80%;
    font-size: 14px;
    line-height: 1.3;
    animation: pop 0.2s ease-out;
}

.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: #000;
}

.ai {
    align-self: flex-start;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.08);
    color: #eaeaea;
}

.inputBar {
    display: flex;
    padding: 10px;
    gap: 10px;
    border-top: 1px solid rgba(255,255,255,0.08);
    background: rgba(0,0,0,0.2);
}

textarea {
    flex: 1;
    resize: none;
    border-radius: 12px;
    border: none;
    padding: 10px;
    background: rgba(255,255,255,0.06);
    color: white;
    outline: none;
}

button {
    padding: 0 16px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #ff6a88, #ff99ac);
    color: black;
    font-weight: 700;
    cursor: pointer;
}

@keyframes pop {
    from { transform: translateY(6px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}
</style>
</head>

<body>

<div style="
    margin: 10px 12px;
    padding: 12px 14px;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(255,106,136,0.15), rgba(79,172,254,0.10));
    border: 1px solid rgba(255,255,255,0.14);
    color: #ffffff;
    font-size: 13px;
    line-height: 1.45;
    text-align: center;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
">
🧩 <b>How ordering works</b><br><br>

1️⃣ Chat with the AI to negotiate your price<br>
2️⃣ The bot will guide you step-by-step to complete your order:<br>
&nbsp;&nbsp;• Name<br>
&nbsp;&nbsp;• Item (fidget toy)<br>
&nbsp;&nbsp;• Colour<br>
&nbsp;&nbsp;• Custom note<br><br>

📦 When finished, your order is automatically emailed.
</div>

    <div id="log"></div>

    <div class="inputBar">
        <textarea id="input" placeholder="Talk to the shop..."></textarea>
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
const API_KEY = "AIzaSyDhtsMO9vareLn9aa2q8NpirCkd2gI3Pnk";
const MODEL = "gemini-3.1-flash-lite";
const ORDER_ENDPOINT = "https://script.google.com/macros/s/AKfycby8LzTGGXH0BvZ0Ep3Lv1i0sr5T_8lN-djyW_QBTy_Ry2bgzCppWoc1NIoucs3SBAhx/exec";
const SYSTEM_PROMPT = `
You are a friendly sales assistant for a school fidget toy stall.

AVAILABLE PRODUCT:
- Small Spiral Passthrough Fidget Toy
- Colour: Multicolour

PRICING:
- There is no fixed selling pressure
- You may suggest prices, but NEVER push aggressively
- Be flexible and accept the user's offer if reasonable

RULES:
1. Keep responses short (max 2 sentences)
2. Be friendly, casual, and helpful
3. Do NOT pressure the user to increase their price
4. Focus on helping the user complete their order smoothly

COLLECT IN THIS ORDER:
- name
- item (assume fidget toy unless user changes it)
- price
- color
- note

ORDER COMPLETION RULE:
Only finalise when the user clearly confirms they want to buy.

FINAL OUTPUT FORMAT (STRICT):
When complete, output EXACTLY:

ORDER_CONFIRM:
{"name":"","item":"","price":"","color":"","note":"","chat_summary":""}

IMPORTANT:
- Do NOT include extra text when outputting ORDER_CONFIRM
- Ensure valid JSON
- No markdown, no explanation

CONVERSATION STYLE:
- Friendly and relaxed
- Light suggestions allowed, but never pressure pricing
- Let the user lead the price decision
- Ask one question at a time

EXAMPLE:
"Hey! Yep, I can sort that for you 😊 What price feels fair for you today?"
`;

const history = [];

function add(text, cls){
    const d = document.createElement("div");
    d.className = "msg " + cls;
    d.textContent = text;
    document.getElementById("log").appendChild(d);
}

async function send(){
    const input = document.getElementById("input");
    const text = input.value.trim();
    if(!text) return;

    input.value = "";
    add(text, "user");

    history.push({ role:"user", parts:[{text}] });

    const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`,
        {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({
                contents: history,
                systemInstruction: {
                    parts:[{text: SYSTEM_PROMPT}]
                }
            })
        }
    );

    const data = await res.json();
    let reply = data?.candidates?.[0]?.content?.parts?.[0]?.text || "error";

    add(reply, "ai");

    history.push({ role:"model", parts:[{text: reply}] });

    // 🧾 ORDER HANDLER
    if(reply.includes("ORDER_CONFIRM:")){
        try{
            const json = reply.split("ORDER_CONFIRM:")[1].trim();
            const order = JSON.parse(json);

            await fetch(ORDER_ENDPOINT, {
                method:"POST",
                headers: { "Content-Type":"application/json" },
                body: JSON.stringify({
                    ...order,
                    full_chat_history: history
                })
            });

            add("📧 Order sent!", "ai");

        } catch(e){
            add("⚠️ Order failed", "ai");
        }
    }
}
</script>

</body>
</html>
